<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Receipt | Paradise Beach Resort</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
body { background:#0a0a0a; color:#fff; padding-top:70px; }

/* Background slider */
.hero-bg { position:fixed; top:0; left:0; width:100%; height:100vh; overflow:hidden; z-index:-1; }
.hero-bg .slide { position:absolute; width:100%; height:100%; background-size:cover; background-position:center; animation:fade 16s infinite; animation-fill-mode:both; }
.hero-bg .slide:nth-child(1){background-image:url('24.jpg'); animation-delay:0s;}
.hero-bg .slide:nth-child(2){background-image:url('23.jpg'); animation-delay:4s;}
.hero-bg .slide:nth-child(3){background-image:url('22.jpg'); animation-delay:8s;}
.hero-bg .slide:nth-child(4){background-image:url('25.jpg'); animation-delay:12s;}
.hero-bg::after { content:''; position:absolute; width:100%; height:100%; background:linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.6)); z-index:1; }
@keyframes fade { 0%{opacity:0;} 5%{opacity:1;} 25%{opacity:1;} 30%{opacity:0;} 100%{opacity:0;} }

/* Receipt box */
.receipt-box { max-width:500px; margin:120px auto; background:rgba(0,0,0,0.7); padding:40px; border-radius:20px; border:2px solid #00c6ff; box-shadow:0 0 30px rgba(0,198,255,0.6); text-align:center; animation:fadeUp 1.5s ease; }
@keyframes fadeUp { from{opacity:0; transform:translateY(40px);} to{opacity:1; transform:translateY(0);} }

.receipt-box h2 { font-size:28px; color:#fff; margin-bottom:20px; text-shadow:0 0 8px #00e5ff, 0 0 16px #00e5ff; }
.receipt-box p { line-height:1.6; margin-bottom:30px; color:#ccc; font-size:16px; }

/* Button */
.btn { padding:14px 30px; background:linear-gradient(45deg,#00c6ff,#0072ff); color:#fff; text-decoration:none; border-radius:50px; font-size:16px; transition:0.4s; }
.btn:hover { transform:scale(1.08); box-shadow:0 0 20px rgba(0,200,255,0.8); }

/* Footer */
.footer { background:#111; color:#fff; text-align:center; padding:15px 0; font-size:14px; margin-top:170px; }
</style>
</head>

<body>
<div class="hero-bg">
  <div class="slide"></div>
  <div class="slide"></div>
  <div class="slide"></div>
  <div class="slide"></div>
</div>

<div class="receipt-box">
  <h2>Booking Confirmed ✅</h2>
  <p>
    Thank you for choosing Paradise Beach Resort.<br><br>
    Your reservation request has been successfully received.<br>
    Our team will contact you shortly to confirm your booking details.
  </p>
  <a href="index.html" class="btn">Return to Home</a>
</div>

<footer class="footer">
  <p>&copy; 2026 Paradise Beach Resort. All Rights Reserved.</p>
</footer>

</body>
</html>
